<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="../dist/output.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de rotina e estudos</title>
</head>
<body class="bg-gray-100 text-gray-900 transition-colors duration-300 dark:bg-gray-900 dark:text-gray-100">
    <div class="max-w-5xl mx-auto px-3 py-8 space-y-8">
    <header class="header-principal sticky top-0 z-50 bg-slate-50/90 dark:bg-slate-900/90 backdrop-blur-md" >
        <h1 class="titulo-painel">Painel de rotina e estudos</h1>
        <div class="grupo-botoes">
            <button id="btn-exportar-csv" class="bg-emerald-600 hover:bg-emerald-500 text-white font-medium text-sm px-4 py-2.5 rounded-xl transition-all cursor-pointer shadow-sm">
    📥 Exportar CSV
</button>
        <button type="button" class="btn-tema" id="btn-light">☀️ light</button>
        <button type="button" class="btn-tema" id="btn-dark">🌕 dark</button>
        </div>
        
    </header>

    <main >
    <section id="form-section" class="sessao-formulario">
        <h2 class="subtitulo-sessao">Nova Tarefa:</h2>
        <form id="task-form" class="form-cadastro">
            <div class="campo-form-inteiro">
                <label for="task-name">Nome da Tarefa:</label>
                <input type="text" id="task-name" placeholder="Estudar rotas no React">
            </div>
            
            <div class="campo-form">
                <label for="task-tech">Tecnologia</label>
                <select id="task-tech">
                    <option value="html">HTML</option>
                    <option value="css">CSS</option>
                    <option value="js">JAVASCRIPT</option>
                    <option value="python">PYTHON</option>
                </select>
            </div>
            <div class="campo-form">
                <label for="task-priority">Prioridade</label>
                <select id="task-priority">
                    <option value="low">BAIXA</option>
                    <option value="medium">MEDIA</option>
                    <option value="high">ALTA</option>                
                </select>
            </div>
                <div class="campor-form">
                <label for="task-status">Status</label>
                <select id="task-status">
                    <option value="pendente">Pendente</option>
                    <option value="fazendo">Fazendo</option>
                    <option value="feito">Feito</option>                
                </select>
            </div>
            <div class="campor-form">
                <label for="task-hours">Horas Estimadas</label>
                <input type="number" id="task-hours" min="1" placeholder="2">
            </div>
            <div class="container-botao-form">
                <button type="submit" class="btn-adicionar">Adicionar Tarefa</button>
            </div>
        </form>
    </section>
    <section id="filters" class="sessao-filtros">
        <h2 class="subtitulo-sessao">FILTROS</h2>
        <div class="grid-filtros">
            <div class="campo-filtros">
                <label for="filter-tech">Tecnologia</label>
                <select  id="filter-tech">
                    <option value="todos">TODAS</option>
                    <option value="html">HTML</option>
                    <option value="css">CSS</option>
                    <option value="js">JAVASCRIPT</option>
                    <option value="python">PYTHON</option>
                </select>
            </div>
            <div class="campo-filtros">
                <label for="filter-status">Status</label>
                <select  id="filter-status">
                    <option value="todos">TODAS</option>
                    <option value="pendente">PENDENTE</option>
                    <option value="fazendo">FAZENDO</option>
                    <option value="feito">FEITO</option>
                </select>
            </div>
            <div class="campo-filtros">
            <label for="filter-priority">Prioridade</label>
            <select id="filter-priority">
                <option value="todos">TODAS</option>
                <option value="baixa">BAIXA</option>
                <option value="media">MEDIA</option>
                <option value="alta">ALTA</option>
            </select>
        </div>
    </div>

    <div class="flex justify-center mt-6">
        <button class="btn-filtrar" type="button" id="btn-filtro">FILTRAR</button>
    </div>

</section>
    <section id="progresso-section" class="sessao-progresso">
        <h2 class="subtitulo-sessao">Painel de Indicadores</h2>
        <div class="grid">
            <div class="card-indicador">
                <h3>
                    Progresso Geral:
                </h3>
                <p id="progresso-geral">Total: 0 | Feitas 0 (0%)</p>
            </div>
            <div class="card-indicador">
                <h3>Horas por Tecnologia: </h3>
                <div id="horas-tecnologia" class="text-sm space-y-1">

                </div>
            </div>
            <div class="card-indicador">
                <h3>Tarefas por Prioridade:</h3>
                <p id="total-prioridades">Alta: 0 | Média: 0 | Baixa: 0</p>
            </div>
        </div>

    </section>
    <section id="cards-grid-section" class="sessao-cards">
        <h2 class="subtitulo-sessao">Minhas Tarefas</h2>
        <div class="cards-grid">
            <div class="card-tarefa">
                <div class="card-header">
                    <h3>Estudar rotas no React</h3>
                    <span class="badge-alta">Alta</span>
                </div>
                <p class="card-info"><strong>Tecnologia:</strong> React</p>
                <p class="card-info"><strong>Horas:</strong> 3h</p>

                <div class="card-footer">
                    <span class="badge-fazendo">Fazendo</span>
                </div>
            </div>
        </div>
    </section>
    </main>
    <script src="app.js"></script>
    </div>
</body>
</html>
